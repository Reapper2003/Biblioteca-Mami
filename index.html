<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca mea</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-emoji">📚</div>
      <h1>Biblioteca mea</h1>
      <p class="subtitle">Toate cărțile tale, la îndemână</p>
    </header>

    <main>
      <!-- Adăugare carte -->
      <section class="card">
        <h2><span class="ico">✍️</span> Adaugă o carte</h2>
        <form id="add-form">
          <button type="button" id="scan-btn" class="btn-scan">📷 Scanează codul de bare</button>
          <div id="scan-help" class="scan-help" hidden></div>
          <div class="or-divider"><span>sau scrie manual</span></div>

          <input type="text" id="title" placeholder="Titlul cărții" required autocomplete="off" />
          <input type="text" id="author" placeholder="Autorul (opțional)" autocomplete="off" />

          <label class="file-btn" for="cover">
            <span class="file-btn-label">🖼️ Adaugă o poză (opțional)</span>
          </label>
          <input type="file" id="cover" accept="image/*" hidden />
          <div id="cover-preview" class="cover-preview"></div>

          <select id="add-status" class="status-select">
            <option value="">Status de citire (opțional)</option>
            <option value="de_citit">📋 De citit</option>
            <option value="in_curs">📖 În curs de citire</option>
            <option value="citita">✅ Citită</option>
          </select>

          <button type="submit" class="btn-primary">Adaugă în bibliotecă</button>
        </form>
      </section>

      <!-- Căutare -->
      <section class="card search-card">
        <div class="search-wrap">
          <span class="search-ico">🔎</span>
          <input type="search" id="search" placeholder="Caută un titlu sau un autor..." autocomplete="off" />
        </div>
      </section>

      <!-- Lista -->
      <section class="card">
        <div class="list-header">
          <h2><span class="ico">📖</span> Cărțile tale</h2>
          <div class="header-right">
            <div class="view-toggle">
              <button type="button" id="view-list" class="view-btn">☰ Listă</button>
              <button type="button" id="view-shelf" class="view-btn">▦ Raft</button>
            </div>
            <span id="count" class="count">0</span>
          </div>
        </div>
        <p id="status" class="status"></p>
        <ul id="book-list"></ul>
      </section>
    </main>

    <footer>
      <p>Apasă pe ✏️ ca să modifici o carte, sau pe 🗑️ ca s-o scoți din listă.</p>
    </footer>
  </div>

  <!-- Fereastra de scanare -->
  <div id="scan-modal" class="modal" hidden>
    <div class="modal-box">
      <h3>📷 Scanează codul de bare</h3>
      <div id="reader"></div>
      <p id="scan-msg" class="scan-msg">Îndreaptă camera spre codul de bare de pe spatele cărții.</p>
      <button type="button" id="scan-close" class="btn-ghost">Închide</button>
    </div>
  </div>

  <!-- Biblioteci externe -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
